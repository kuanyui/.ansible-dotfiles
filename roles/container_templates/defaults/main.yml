---
# `container_templates_output_dir` is where the rendered Makefile + Dockerfile
# + dotfiles trees land. The default is the install location used by daily
# workflows (Makefile invoked via `make -C` or, after PR2 step 3b, by launcher
# scripts in `~/.local/bin/`). Callers (e.g. `roles/container_apps` via
# `include_role`, or one-off `ansible-playbook -e ...`) can override this to
# stage rendered output elsewhere - useful for scaffolding a new project from
# a template without touching the user's install.
container_templates_output_dir: "{{ ansible_env.HOME }}/.local/share/container-templates"

# `container_templates` enumerates every container variant this role renders.
# Each entry mirrors the dataclass `ContainerConfig` in the legacy
# `render_j2.py`; adding a new container only requires appending here.
container_templates:
  - name: claude
    naming_prefix: claude_code
    image_platform: linux/amd64
    image_name: debian:12
    tz: Asia/Taipei
    distro_pkgs: []
    feature_presets:
      - zsh
      - qemacs
    nodejs:
      npm_global_pkgs:
        - "@anthropic-ai/claude-code"
    agent:
      target_suffix: claude
      command: npx claude
      display_name: claude-code
    publish_ports: []

  - name: codex
    naming_prefix: codex
    image_platform: linux/amd64
    image_name: debian:12
    tz: Asia/Taipei
    distro_pkgs:
      - links2
    feature_presets:
      - zsh
      - qemacs
    nodejs:
      npm_global_pkgs:
        - "@openai/codex"
    agent:
      target_suffix: codex
      command: npx codex
      display_name: codex
      auth_note: "⚠️ Then use `links2` browser in container to finish the authentication to openai"
    publish_ports:
      - "1455:1455/tcp"
