---
setup_podman: false
podman_runtime: "default"  # "default" (remove managed config, let distro decide) | "libkrun"
podman_runtime_scope: "user"  # "user" or "system"
podman_libkrun_packages_suse:
  # libkrunfw is bundled into libkrun1 on openSUSE Tumbleweed (no separate package, unlike Fedora)
  - libkrun1
  - crun
