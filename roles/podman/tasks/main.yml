---
- name: Check `libkrun` packages presence via `rpm -q` when `setup_podman` is true and `podman_runtime` is `libkrun` (openSUSE)
  ansible.builtin.command:
    argv: "{{ ['rpm', '-q'] + podman_libkrun_packages_suse }}"
  register: _libkrun_rpm_check
  changed_when: false
  failed_when: false
  when:
    - setup_podman
    - podman_runtime == 'libkrun'
    - ansible_facts['os_family'] == 'Suse'

- name: Install missing `libkrun` packages via `zypper install` when `setup_podman` is true and `podman_runtime` is `libkrun` (openSUSE)
  ansible.builtin.command:
    argv: "{{ ['zypper', '--non-interactive', 'install'] + podman_libkrun_packages_suse }}"
  become: true
  when:
    - setup_podman
    - podman_runtime == 'libkrun'
    - ansible_facts['os_family'] == 'Suse'
    - _libkrun_rpm_check.rc != 0

- name: Query `crun` feature flags via `crun --version` when `setup_podman` is true and `podman_runtime` is `libkrun`
  ansible.builtin.command: crun --version
  register: _crun_version
  changed_when: false
  when:
    - setup_podman
    - podman_runtime == 'libkrun'

- name: Assert `crun` was built with `+LIBKRUN` feature flag when `setup_podman` is true and `podman_runtime` is `libkrun`
  ansible.builtin.assert:
    that: "'+LIBKRUN' in _crun_version.stdout"
    fail_msg: >-
      Installed crun lacks +LIBKRUN feature flag; podman cannot use the libkrun
      handler even with libkrun1/libkrunfw installed. Check distro crun build.
  when:
    - setup_podman
    - podman_runtime == 'libkrun'

- name: Set `_podman_containers_conf_path` to `~/.config/containers/containers.conf` when `podman_runtime_scope` is `user`
  ansible.builtin.set_fact:
    _podman_containers_conf_path: "{{ ansible_env.HOME }}/.config/containers/containers.conf"
  when: setup_podman and podman_runtime_scope == 'user'

- name: Set `_podman_containers_conf_path` to `/etc/containers/containers.conf` when `podman_runtime_scope` is `system`
  ansible.builtin.set_fact:
    _podman_containers_conf_path: "/etc/containers/containers.conf"
  when: setup_podman and podman_runtime_scope == 'system'

- name: Create `~/.config/containers/` directory when `setup_podman` is true and `podman_runtime_scope` is `user`
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/containers"
    state: directory
    mode: "0755"
  when:
    - setup_podman
    - podman_runtime_scope == 'user'

- name: Deploy `containers.conf` to `{{ _podman_containers_conf_path }}` when `setup_podman` is true and `podman_runtime` is `libkrun`
  ansible.builtin.template:
    src: containers.conf.j2
    dest: "{{ _podman_containers_conf_path }}"
    mode: "0644"
  become: "{{ (podman_runtime_scope == 'system') | bool }}"
  when:
    - setup_podman
    - podman_runtime == 'libkrun'

- name: Query effective `podman` OCI runtime via `podman info` when `setup_podman` is true and `podman_runtime` is `libkrun`
  ansible.builtin.command: podman info --format json
  register: _podman_info
  changed_when: false
  when:
    - setup_podman
    - podman_runtime == 'libkrun'

- name: Assert `podman` is using `krun` as effective OCI runtime when `setup_podman` is true and `podman_runtime` is `libkrun`
  ansible.builtin.assert:
    that: "(_podman_info.stdout | from_json).host.ociRuntime.name == 'krun'"
    fail_msg: >-
      Expected podman OCI runtime to be 'krun' but it reports
      '{{ (_podman_info.stdout | from_json).host.ociRuntime.name }}'.
      Managed containers.conf at {{ _podman_containers_conf_path }} may not
      have taken effect - check podman_runtime_scope or whether the playbook
      ran as the intended user.
  when:
    - setup_podman
    - podman_runtime == 'libkrun'

- name: Remove `{{ _podman_containers_conf_path }}` to revert to distro default runtime when `setup_podman` is true and `podman_runtime` is `default`
  ansible.builtin.file:
    path: "{{ _podman_containers_conf_path }}"
    state: absent
  become: "{{ (podman_runtime_scope == 'system') | bool }}"
  when:
    - setup_podman
    - podman_runtime == 'default'
