---
# `present` installs (render templates + drop launchers/completions/manifest).
# `absent` reads the manifest at `install_root/.ansible-manifest.yml` and
# removes everything it recorded (launchers, completions, the install_root
# itself). Run as `ansible-playbook playbooks/container_apps_uninstall.yml`,
# or pass `-e container_apps_state=absent` to the install playbook.
container_apps_state: present

# Where the rendered Makefile + Dockerfile + dotfiles trees live. Shared with
# `roles/container_templates` via `include_role` (this role injects this path
# as `container_templates_output_dir`).
container_apps_install_root: "{{ ansible_env.HOME }}/.local/share/container-templates"

# Where to drop launcher scripts. Must be on the user's PATH for the launcher
# names (e.g. `claude-crun`) to be invocable.
container_apps_bin_dir: "{{ ansible_env.HOME }}/.local/bin"

# Where to drop zsh completion files. `roles/zsh`'s rendered `.zshrc` adds
# this dir to fpath BEFORE compinit so completions are picked up automatically.
container_apps_zsh_completion_dir: "{{ ansible_env.HOME }}/.local/share/zsh/site-functions"

# Where to drop bash completion files. bash-completion's dynamic loader auto-
# sources `<dir>/<cmd>` on first tab-completion of `<cmd>`. The user's
# `~/.bashrc` (via `roles/dotfiles`) sources bash-completion which enables this.
container_apps_bash_completion_dir: "{{ ansible_env.HOME }}/.local/share/bash-completion/completions"

# `container_apps` enumerates which `container_templates` entries to install
# as launcher-driven apps, and which runtime variants to expose for each.
# Each `(template, runtime)` pair produces one launcher at
# `<bin_dir>/<template>-<runtime>` (e.g. `claude-crun`, `claude-krun`).
#
# `template` MUST match a `name` in `container_templates` (defined in
# `roles/container_templates/defaults/main.yml`).
container_apps:
  - template: claude
    runtimes: [crun, krun]
  - template: codex
    runtimes: [crun, krun]
