---
# Called once per package (bash, zsh, emacs, tmux, ...).
# with_filetree walks the package dir and gives item.path relative to it,
# so "user/bash/.bashrc" becomes item.path = ".bashrc" → dest = target_home/.bashrc.
#
# copy module default follow: false means symlinks at the destination are
# replaced by real files — stow-managed symlinks are migrated automatically.

- name: "Create directories — {{ package }}"
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item.path }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: "0755"
  when: item.state == 'directory'
  with_filetree: "{{ dotfiles_src_dir }}/{{ package }}"

- name: "Copy dotfiles — {{ package }}"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ target_home }}/{{ item.path }}"
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: preserve
    follow: false   # replace symlinks at dest with real files (stow migration)
    force: true
  when: item.state == 'file'
  with_filetree: "{{ dotfiles_src_dir }}/{{ package }}"
