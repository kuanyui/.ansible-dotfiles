---
- name: Verify required variables are set
  ansible.builtin.assert:
    that:
      - target_home != ""
      - target_user != ""
      - target_group != ""
    msg: "target_home, target_user, target_group must all be set by the calling playbook"

- name: Create directories for static files
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item.path }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: "0755"
  when:
    - item.state == 'directory'
    - install_emacs or not (item.path | regex_search('\.emacs\.d'))
  with_filetree: "{{ role_path }}/files/"

- name: Deploy static dotfiles
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ target_home }}/{{ item.path }}"
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: preserve
    follow: false
    force: true
  when:
    - item.state == 'file'
    - install_emacs or not (item.path | regex_search('\.emacs\.d'))
  with_filetree: "{{ role_path }}/files/"

- name: Create directories for templated dotfiles
  ansible.builtin.file:
    path: "{{ target_home }}/{{ item.path }}"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: "0755"
  when:
    - item.state == 'directory'
    - install_emacs or not (item.path | regex_search('\.emacs\.d'))
  with_filetree: "{{ role_path }}/templates/"

- name: Deploy templated dotfiles
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ target_home }}/{{ item.path | regex_replace('\\.j2$', '') }}"
    owner: "{{ target_user }}"
    group: "{{ target_group }}"
    mode: "0644"
    force: true
  when:
    - item.state == 'file'
    - install_emacs or not (item.path | regex_search('\.emacs\.d'))
    - install_zsh or item.path != '.zshrc.j2'
  with_filetree: "{{ role_path }}/templates/"
