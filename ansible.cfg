[defaults]
inventory          = inventory.ini
roles_path         = roles
stdout_callback    = ansible.builtin.default
display_skipped_hosts = false
diff_always        = True
# Header injected via `{{ ansible_managed }}` into every rendered template.
# Default Ansible format is uninformatively terse; this one tells future-you /
# future-readers exactly where the source-of-truth lives so the file doesn't
# get hand-edited only to be silently overwritten on the next playbook run.
ansible_managed    = MANAGED BY ANSIBLE - DO NOT EDIT. Source template: {file} (mtime %Y-%m-%d %H:%M:%S). Rendered by {uid} on {host}.
